name: summify
description: 'A new Flutter project.'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.0
  get_it: ^7.6.0
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.8.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_downloader: ^1.11.6
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  dio: ^5.4.0
  path: ^1.9.0
  intl: ^0.19.0
  http: ^1.2.0
  google_generative_ai: ^0.4.0
  flutter_markdown: ^0.7.3+1
  audioplayers: ^5.2.1
  youtube_player_flutter: ^9.1.1
  video_player: ^2.8.2
  shimmer: ^3.0.0
  flutter_pdfview: ^1.2.3
  url_launcher: ^6.2.5
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1

# إعدادات الأيقونات (يجب أن تبدأ من أول السطر)
flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/images/app_icon.png'
  adaptive_icon_background: '#0F172A'
  adaptive_icon_foreground: 'assets/images/app_icon.png'

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
