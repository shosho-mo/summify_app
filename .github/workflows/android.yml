name: Flutter Build APK

on:
  push:
    branches: [ "main" ] # تأكد من اسم الفرع (قد يكون master أو main)
  workflow_dispatch: # لتشغيل البناء يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x' # يمكنك تحديد إصدار معين أو تركه ليستخدم الأحدث
        channel: 'stable'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    # اختيار اختياري: تشغيل الاختبارات للتأكد من سلامة الكود
    # - name: Run tests
    #   run: flutter test

    - name: Build APK
      run: flutter build apk --debug # يمكنك تغييرها إلى --release إذا أضفت مفاتيح التوقيع

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flutter-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
