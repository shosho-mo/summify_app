name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ] # سيعمل على أي منهما
  workflow_dispatch: # يتيح لكِ زر "Run workflow" يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      # يفضل استخدام release لتقليل الحجم
      run: flutter build apk --release --no-codesign

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: summify-app-release
        # لاحظي هنا غيرنا المسار ليتوافق مع الـ release
        path: build/app/outputs/flutter-apk/app-release.apk
